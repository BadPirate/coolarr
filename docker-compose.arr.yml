
x-common: &common
  user: 0:0
  environment: &default_env
    TZ: ${TZ:-Etc/UTC}
    PUID: 0
    PGID: 0
  restart: unless-stopped

services:
############################
# Whisparr
############################

  whisparr:
    <<: *gluetun-network
    image: ghcr.io/thespad/whisparr:latest
    volumes:
      - '~/data/trash/config/whisparr:/config'
      - '~/data/trash/data:/data'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6969"]

############################
# RADARR
############################

  radarr:
    <<: *gluetun-network
    image: 'lscr.io/linuxserver/radarr:latest'
    volumes:
      - '~/data/trash/config/radarr:/config'
      - '~/data/trash/data:/data'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7878/"]
    
############################
# SONARR
############################

  sonarr:
    <<: *gluetun-network
    image: 'lscr.io/linuxserver/sonarr:latest'
    volumes:
      - '~/data/trash/config/sonarr:/config'
      - '~/data/trash/data:/data'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989/"]

############################
# SABNZBD
############################

  sabnzbd:
    <<: *gluetun-network
    image: 'lscr.io/linuxserver/sabnzbd:latest'
    volumes:
      - '~/data/trash/config/sabnzbd:/config'
      - '~/data/trash/data:/data'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/"]

