
x-common: &common
  user: ${PUID:-0}:${PGID:-0}
  environment: &default_env
    TZ: ${TZ:-Etc/UTC}
    PUID: ${PUID:-0}
    PGID: ${PGID:-0}
  restart: unless-stopped

x-background: &background
  <<: *common
  cpu_shares: ${BACKGROUND_CPU_SHARES:-2}
  blkio_config:
    weight: 10


x-gluetun-network: &gluetun-network
  <<: *common
  network_mode: 'service:gluetun'
  depends_on:
    gluetun:
      condition: service_healthy

services:
############################
# GLUETUN
############################

  gluetun:
    <<: *common
    image: qmcgaw/gluetun
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - SERVICE_URL_GLUETUN_8080 # qbittorrent
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER:-nordvpn}
      - VPN_TYPE=${VPN_TYPE:-openvpn}
      # WireGuard (NordLynx) is far lighter on CPU than OpenVPN on the Pi (no AES-NI).
      # Set VPN_TYPE=wireguard and WIREGUARD_PRIVATE_KEY in .env to use it.
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY:-}
      - OPENVPN_USER=${OPENVPN_USER}
      - OPENVPN_PASSWORD=${OPENVPN_PASSWORD}
      - SERVER_COUNTRIES=${SERVER_COUNTRIES:-Netherlands}
      - SHADOWSOCKS=${SHADOWSOCKS:-on}
      # Prefer SERVER_CITIES (CITY is deprecated). Matches Nord server filter.
      - SERVER_CITIES=${SERVER_CITIES:-${CITY:-Amsterdam}}
      # TCP+TLS healthchecks use IPs so startup does not depend on Gluetun DNS
      # (avoids "lookup github.com/cloudflare.com: i/o timeout" while blocklists load).
      - HEALTH_TARGET_ADDRESSES=1.1.1.1:443,8.8.8.8:443
    volumes:
      - type: volume
        source: trash
        target: /gluetun
        volume:
          subpath: config/gluetun
    # Use Gluetun's own check (HTTP 127.0.0.1:9999), not wget+DNS to google.com.
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 10s
      timeout: 10s
      start_period: 60s
      retries: 3

############################
# QBITTORRENT		
############################

  qbittorrent:
    <<: [*gluetun-network, *background]
    image: lscr.io/linuxserver/qbittorrent:latest
    volumes:
      - type: volume
        source: trash
        target: /config
        volume:
          subpath: config/qbittorrent
      - type: volume
        source: trash
        target: /data
        volume:
          subpath: data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]


############################
# FLARESOLVERR
############################

  flaresolverr:
    <<: *common
    image: 'ghcr.io/flaresolverr/flaresolverr:latest'
    container_name: flaresolverr
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8191/health"]

############################
# PROWLARR
############################

  prowlarr:
    <<: *common
    image: 'linuxserver/prowlarr:develop'
    environment:
      - SERVICE_URL_PROWLARR_9696
    depends_on:
      flaresolverr:
        condition: service_healthy
    volumes:
      - type: volume
        source: trash
        target: /config
        volume:
          subpath: config/prowlarr
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9696"]

  sonarr:
    <<: *common
    image: 'lscr.io/linuxserver/sonarr:latest'
    environment:
      - SERVICE_URL_SONARR_8989
    volumes:
      - type: volume
        source: trash
        target: /config
        volume:
          subpath: config/sonarr
      - type: volume
        source: trash
        target: /data
        volume:
          subpath: data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989/"]

  radarr:
    <<: *common
    image: 'lscr.io/linuxserver/radarr:latest'
    environment:
      - SERVICE_URL_RADARR_7878
    expose:
      - 7878
    volumes:
      - type: volume
        source: trash
        target: /config
        volume:
          subpath: config/radarr
      - type: volume
        source: trash
        target: /data
        volume:
          subpath: data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7878/"]

############################
# UNMANIC
############################

  unmanic:
    <<: *background
    build:
      context: .
      dockerfile: docker/unmanic/Dockerfile
    image: arr-unmanic:safari-h264
    environment:
      <<: *default_env
      HOME_DIR: /config
      SERVICE_URL_UNMANIC_8888:
    volumes:
      - type: volume
        source: trash
        target: /config
        volume:
          subpath: config/unmanic
      - type: volume
        source: trash
        target: /library
        volume:
          subpath: data/media
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/"]

  jellyfin:
    <<: *common
    image: lscr.io/linuxserver/jellyfin:latest
    environment:
      - SERVICE_URL_JELLYFIN_8096
    ports:
      - 8096:8096
    volumes:
      - type: volume
        source: trash
        target: /config
        volume:
          subpath: config/jellyfin
      - type: volume
        source: trash
        target: /data
        volume:
          subpath: data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/"]

volumes:
  trash:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/trash