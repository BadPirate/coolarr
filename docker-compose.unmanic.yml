
x-common: &common
  user: 0:0
  environment: &default_env
    TZ: ${TZ:-Etc/UTC}
    PUID: 0
    PGID: 0
  restart: unless-stopped

services:

############################
# Unmanic	
############################

  unmanic:
    <<: *common
    build:
      context: .
      dockerfile: docker/unmanic/Dockerfile
    image: arr-unmanic:safari-h264
    cpus: 0.8
    environment:
      <<: *default_env
      HOME_DIR: /config
    volumes:
      - type: volume
        source: trash
        target: /config
        volume:
          subpath: config/unmanic
      - type: volume
        source: trash
        target: /library
        volume:
          subpath: data/media
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/"]
