############################
# Unmanic	
############################
# Build uses repo root as context (reliable on Coolify/CI). If build fails with
# "load local bake definitions", set host env COMPOSE_BAKE=false for docker compose build.

  unmanic:
    <<: *common
    build:
      context: .
      dockerfile: docker/unmanic/Dockerfile
    image: arr-unmanic:safari-h264
    cpus: 0.8
    environment:
      <<: *default_env
      HOME_DIR: /config
    volumes:
      - '~/data/trash/config/unmanic:/config'
      - '~/data/trash/data/media:/library'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/"]

