
x-common: &common
  user: 0:0
  environment: &default_env
    TZ: ${TZ:-Etc/UTC}
    PUID: 0
    PGID: 0
  restart: unless-stopped

x-gluetun-network: &gluetun-network
  <<: *common
  network_mode: 'service:gluetun'
  depends_on:
    gluetun:
      condition: service_healthy

services:
############################
# GLUETUN
############################

  gluetun:
    <<: *common
    image: qmcgaw/gluetun
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER:-nordvpn}
      - VPN_TYPE=${VPN_TYPE:-openvpn}
      - OPENVPN_USER=${OPENVPN_USER}
      - OPENVPN_PASSWORD=${OPENVPN_PASSWORD}
      - SERVER_COUNTRIES=${SERVER_COUNTRIES:-Netherlands}
      - SHADOWSOCKS=${SHADOWSOCKS:-on}
      # Prefer SERVER_CITIES (CITY is deprecated). Matches Nord server filter.
      - SERVER_CITIES=${SERVER_CITIES:-${CITY:-Amsterdam}}
      # TCP+TLS healthchecks use IPs so startup does not depend on Gluetun DNS
      # (avoids "lookup github.com/cloudflare.com: i/o timeout" while blocklists load).
      - HEALTH_TARGET_ADDRESSES=1.1.1.1:443,8.8.8.8:443
    volumes:
      - '~/data/trash/config/gluetun:/gluetun'
    # Use Gluetun's own check (HTTP 127.0.0.1:9999), not wget+DNS to google.com.
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 10s
      timeout: 10s
      start_period: 60s
      retries: 3

############################
# QBITTORRENT		
############################

  qbittorrent:
    <<: *gluetun-network
    image: lscr.io/linuxserver/qbittorrent:latest
    volumes:
      - '~/data/trash/config/qbittorrent:/config'
      - '~/data/trash/data/torrents:/data/torrents'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]

############################
# FLARESOLVERR
############################

  flaresolverr:
    <<: *gluetun-network
    image: 'ghcr.io/flaresolverr/flaresolverr:latest'
    container_name: flaresolverr
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8191/health"]

############################
# PROWLARR
############################

  prowlarr:
    <<: *gluetun-network
    image: 'linuxserver/prowlarr:develop'
    depends_on:
      flaresolverr:
        condition: service_healthy
    volumes:
      - '~/data/trash/config/prowlarr:/config'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9696"]

############################
# Whisparr
############################

  whisparr:
    <<: *gluetun-network
