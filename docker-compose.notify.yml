
x-common: &common
  user: 0:0
  environment: &default_env
    TZ: ${TZ:-Etc/UTC}
    PUID: 0
    PGID: 0
  restart: unless-stopped

services:
############################
# Notifiarr	
############################

  notifiarr:
    <<: *common
    image: golift/notifiarr:latest
    volumes:
      - '/data/trash/config/notifiarr:/config'
      - '/data/trash/data:/data'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5454/"]