
x-common: &common
  user: 0:0
  environment: &default_env
    TZ: ${TZ:-Etc/UTC}
    PUID: 0
    PGID: 0
  restart: unless-stopped

services:
############################
# Jellyfin  
############################

  jellyfin:
    <<: *common
    image: lscr.io/linuxserver/jellyfin:latest
    volumes:
      - type: volume
        source: trash
        target: /config
        volume:
          subpath: config/jellyfin
      - type: volume
        source: trash
        target: /data
        volume:
          subpath: data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/"]
